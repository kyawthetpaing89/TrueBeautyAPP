<form autocomplete="off">
  <div class="card">
    <h6 class="card-header">
      <i class="fa-solid fa-calendar-check fa-lg"></i> Booking List
    </h6>
    <div class="card-body">
      <div class="row g-3">
        <div class="row g-3">
          <!-- Year -->
          <div
            class="col-12 col-md-4 col-lg-4 col-xl-3 d-flex align-items-center"
          >
            <label for="ddlSYear" class="w150">Year:</label>
            <select
              id="ddlSYear"
              class="form-control form-control-sm"
              (change)="loadCalendarInfo()"
              [(ngModel)]="selectedyear"
              name="selectedyear"
            >
              <!-- Updated *ngFor to @for block -->
              @for (year of years; track year) {
              <option class="text-center" [value]="year">
                {{ year }}
              </option>
              }
            </select>
          </div>
          <div
            class="col-sm-12 col-md-4 col-lg-3 col-xl-3 d-flex align-items-center"
          >
            <label for="ddlSMonth" class="w150">Month:</label>
            <select
              id="ddlSMonth"
              class="form-control form-control-sm"
              [(ngModel)]="selectedmonth"
              (change)="loadCalendarInfo()"
              name="selectedmonth"
            >
              <!-- Updated *ngFor to @for block -->
              @for (month of months; track month.value) {
              <option class="text-center" [value]="month.value">
                {{ month.name }}
              </option>
              }
            </select>
          </div>
        </div>
      </div>
      <hr />
      <div #calendarContainer></div>
    </div>
  </div>
</form>
