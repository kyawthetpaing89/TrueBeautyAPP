<h3 mat-dialog-title>
  <span>Booking Register</span>
  <a (click)="closeDialog()" aria-label="Close">
    <mat-icon>close</mat-icon>
  </a>
</h3>
<mat-dialog-content>
  <div class="row">
    <div class="col-lg-12 col-xl-12 mb-3">
      <label for="txtClientID" class="form-label">Booking Code</label>
      <input
        type="text"
        class="form-control form-control-sm"
        readonly
        id="txtBookingCD"
        [(ngModel)]="bookingcd"
        name="bookingcd"
        tabindex="-1"
      />
    </div>

    <div class="col-lg-12 col-xl-12 mb-3">
      <label for="txtClientID" class="form-label">Client ID</label>

      <div class="d-flex">
        <input
          type="text"
          class="form-control form-control-sm me-2"
          readonly
          id="txtClientID"
          [(ngModel)]="clientid"
          name="clientid"
          tabindex="-1"
        />
        <button
          id="btnClient"
          type="button"
          class="btn btn-sm btn-info"
          (click)="openClientSearchDialog()"
          [disabled]="mode === 'Cancel'"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </div>

    <div class="col-lg-12 col-xl-12 mb-3">
      <label for="txtClientName" class="form-label">Client Name</label>
      <input
        type="text"
        class="form-control form-control-sm"
        id="txtClientName"
        [(ngModel)]="clientname"
        name="clientname"
        readonly
      />
    </div>

    <div class="col-lg-12 col-xl-12 mb-3">
      <label for="txtBookingDate" class="form-label">Booking Date</label>
      <input
        type="text"
        class="form-control form-control-sm text-center"
        id="txtBookingDate"
        [(ngModel)]="bookingdate"
        name="bookingdate"
        readonly
      />
    </div>
    <div class="col-lg-12 col-xl-12 mb-3">
      <label for="txtNote" class="form-label">Notes</label>
      <textarea
        id="txtNote"
        class="form-control form-control-sm"
        [(ngModel)]="note"
        name="note"
        [disabled]="mode === 'Cancel'"
      ></textarea>
    </div>
    <!-- Replaced *ngIf with @if block -->
    @if (mode === 'Cancel') {
    <div class="col-lg-12 col-xl-12 mb-3">
      <label for="txtCancelReason" class="form-label">Cancel Reason</label>
      <textarea
        id="txtCancelReason"
        class="form-control form-control-sm"
        [(ngModel)]="cancelreason"
        name="cancelreason"
      ></textarea>
    </div>
    }
  </div>

  <label class="form-label">Booking Time</label>

  <div class="slot-grid">
    <!-- Replaced *ngFor with @for block -->
    @for (slot of slotTimes; track slot.index) {
    <div
      class="slot"
      [class.disabled]="
        bookingslot.includes(slot.index.toString()) || mode === 'Cancel'
      "
      [class.selected]="selectedSlotIndex === slot.index"
      (click)="
        !bookingslot.includes(slot.index.toString()) && selectSlot(slot.index)
      "
    >
      {{ slot.label }}
    </div>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    id="btncancel"
    type="button"
    (click)="closeDialog()"
    class="btn w100 btn-dark btn-sm mr5"
  >
    Close
  </button>
  <button
    type="button"
    id="btnSaveInvoice"
    class="btn w100 btn-sm mr5"
    [ngClass]="{
      'btn-success': mode === 'New',
      'btn-danger': mode === 'Cancel'
    }"
    (click)="save()"
    [disabled]="isSubmitting"
  >
    {{ mode === "New" ? "Save" : "Cancel" }}
  </button>
</mat-dialog-actions>
