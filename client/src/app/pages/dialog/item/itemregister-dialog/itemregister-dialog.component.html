<form autocomplete="off">
  <h3 mat-dialog-title>
    {{ itemTypeName }} - {{ mode }} Mode
    <a (click)="closeDialog()" aria-label="Close">
      <mat-icon>close</mat-icon>
    </a>
  </h3>
  <mat-dialog-content>
    <div class="row">
      <div class="col-lg-12 col-xl-12 mb-3">
        <label for="txtItemCD" class="form-label">Item Code</label>
        <input
          type="text"
          class="form-control form-control-sm"
          readonly
          id="txtItemCD"
          [(ngModel)]="itemCD"
          name="itemCD"
          tabindex="-1"
        />
      </div>
      <div class="col-lg-12 col-xl-12 mb-3">
        <label for="txtItemName" class="form-label">Name</label>
        <input
          type="text"
          class="form-control form-control-sm"
          id="txtItemName"
          [(ngModel)]="itemName"
          name="itemName"
          [disabled]="mode === 'Delete'"
        />
      </div>
      <div class="col-lg-12 col-xl-12 mb-3">
        <label for="txtQuantity" class="form-label">Quantity</label>
        <input
          type="text"
          class="form-control form-control-sm text-right"
          id="txtQuantity"
          maxlength="4"
          [(ngModel)]="quantity"
          name="quantity"
          (ngModelChange)="onQuantityChange($event)"
          (keydown)="generalservice.allowNumbersOnly($event)"
          [disabled]="mode === 'Delete'"
        />
      </div>
      <div class="col-lg-12 col-xl-12 mb-3">
        <label for="txtDescription" class="form-label">Description</label>
        <textarea
          id="txtDescription"
          class="form-control form-control-sm"
          [(ngModel)]="description"
          name="description"
          [disabled]="mode === 'Delete'"
        ></textarea>
      </div>
      <div class="col-lg-12 col-xl-12 mb-3">
        <label for="txtPrice" class="form-label">Price</label>
        <input
          type="text"
          class="form-control form-control-sm text-right"
          id="txtPrice"
          [(ngModel)]="price"
          name="price"
          (ngModelChange)="onPriceChange($event)"
          (keydown)="generalservice.allowNumbersOnly($event)"
          [disabled]="mode === 'Delete'"
        />
      </div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button
      id="btncancel"
      type="button"
      (click)="closeDialog()"
      class="btn w100 btn-dark btn-sm mr5"
    >
      Cancel
    </button>
    <button
      type="button"
      id="btnSaveInvoice"
      class="btn w100 btn-sm mr5"
      [ngClass]="{
        'btn-success': mode === 'New',
        'btn-info': mode === 'Edit',
        'btn-danger': mode === 'Delete'
      }"
      (click)="save()"
      [disabled]="isSubmitting"
    >
      {{
        mode === "New"
          ? "Save"
          : mode === "Edit"
          ? "Update"
          : mode === "Delete"
          ? "Delete"
          : "Submit"
      }}
    </button>
  </mat-dialog-actions>
</form>
