<div class="confirm">
  <h2 mat-dialog-title>Confirmation</h2>

  <mat-dialog-content [innerHTML]="sanitizedHtml"></mat-dialog-content>

  <mat-dialog-actions>
    <button mat-button (click)="onCancel()">No</button>
    <button mat-button color="primary" (click)="onConfirm()">Yes</button>
  </mat-dialog-actions>
</div>
