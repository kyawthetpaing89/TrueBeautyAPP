<form autocomplete="off">
  <h3 mat-dialog-title>
    <span>Holiday {{ mode == "New" ? "Register" : "Delete" }}</span>
    <a (click)="closeDialog()" aria-label="Close">
      <mat-icon>close</mat-icon>
    </a>
  </h3>
  <mat-dialog-content>
    <div class="row">
      <div class="col-lg-12 col-xl-12 mb-3">
        <label for="txtHolidayDate" class="form-label">Holiday Date</label>
        <input
          type="text"
          class="form-control form-control-sm text-center"
          readonly
          id="txtHolidayDate"
          [(ngModel)]="holidayDate"
          name="holidayDate"
          tabindex="-1"
        />
      </div>
      <div class="col-lg-12 col-xl-12 mb-3">
        <label for="txtDescription" class="form-label">Description</label>
        <input
          type="text"
          class="form-control form-control-sm"
          id="txtDescription"
          [(ngModel)]="description"
          name="description"
          autofocus
          [disabled]="mode === 'Delete'"
        />
      </div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button
      id="btncancel"
      type="button"
      (click)="closeDialog()"
      class="btn w100 btn-dark btn-sm mr5"
    >
      Cancel
    </button>
    <button
      type="button"
      id="btnSaveInvoice"
      class="btn w100 btn-sm mr5"
      [ngClass]="{
        'btn-success': mode === 'New',
        'btn-danger': mode === 'Delete'
      }"
      (click)="save()"
      [disabled]="isSubmitting"
    >
      {{ mode === "New" ? "Save" : "Delete" }}
    </button>
  </mat-dialog-actions>
</form>
